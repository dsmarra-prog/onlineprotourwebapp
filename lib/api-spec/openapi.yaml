openapi: 3.0.3
info:
  title: Api
  version: 0.1.0
  description: PDC Darts Career Mode API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: career
    description: Career management
  - name: tour
    description: Online Pro Tour tournament management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /career:
    get:
      operationId: getCareer
      tags: [career]
      summary: Get full career state
      responses:
        "200":
          description: Career state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerState"

  /career/start:
    post:
      operationId: startMatch
      tags: [career]
      summary: Start the next tournament match
      responses:
        "200":
          description: Updated career state with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerResponse"

  /career/result:
    post:
      operationId: submitResult
      tags: [career]
      summary: Submit match result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchResult"
      responses:
        "200":
          description: Updated career state with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerResponse"

  /career/autodarts:
    post:
      operationId: pullAutodarts
      tags: [career]
      summary: Pull latest match result from Autodarts API
      responses:
        "200":
          description: Result pulled from Autodarts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerResponse"

  /career/reset:
    post:
      operationId: resetCareer
      tags: [career]
      summary: Reset career to beginning
      responses:
        "200":
          description: Reset complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerResponse"

  /career/name:
    post:
      operationId: setPlayerName
      tags: [career]
      summary: Set player name (first-time setup)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetNameRequest"
      responses:
        "200":
          description: Name set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerResponse"

  /career/history:
    get:
      operationId: getTournamentHistory
      tags: [career]
      summary: Get full tournament history
      responses:
        "200":
          description: Tournament history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentHistoryResponse"

  /career/h2h:
    get:
      operationId: getH2H
      tags: [career]
      summary: Get all H2H records
      responses:
        "200":
          description: H2H records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/H2HResponse"

  /career/calendar:
    get:
      operationId: getCalendar
      tags: [career]
      summary: Get full season calendar with status
      responses:
        "200":
          description: Season calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarResponse"

  /career/equipment:
    get:
      operationId: getEquipment
      tags: [career]
      summary: Get available equipment and owned items
      responses:
        "200":
          description: Equipment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentResponse"

  /career/equipment/buy:
    post:
      operationId: buyEquipment
      tags: [career]
      summary: Buy an equipment item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyEquipmentRequest"
      responses:
        "200":
          description: Purchase result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerResponse"

  # ── Online Pro Tour ───────────────────────────────────────────────────────────
  /tour/players:
    get:
      operationId: tourListPlayers
      tags: [tour]
      summary: List all tour players
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourPlayer"
    post:
      operationId: tourRegisterPlayer
      tags: [tour]
      summary: Register a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourRegisterBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourPlayer"

  /tour/players/{id}:
    get:
      operationId: tourGetPlayer
      tags: [tour]
      summary: Get player profile with tournament history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourPlayerProfile"

  /tour/tournaments:
    get:
      operationId: tourListTournaments
      tags: [tour]
      summary: List all tournaments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourTournament"
    post:
      operationId: tourCreateTournament
      tags: [tour]
      summary: Create a new tournament (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourCreateTournamentBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourTournament"

  /tour/tournaments/{id}:
    get:
      operationId: tourGetTournament
      tags: [tour]
      summary: Get tournament with full bracket and matches
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourTournamentDetail"
    delete:
      operationId: tourDeleteTournament
      tags: [tour]
      summary: Delete tournament (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourOkResponse"

  /tour/tournaments/{id}/entries:
    post:
      operationId: tourAddEntry
      tags: [tour]
      summary: Add player to tournament (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourAddEntryBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourTournamentDetail"
    delete:
      operationId: tourRemoveEntry
      tags: [tour]
      summary: Remove player from tournament (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourRemoveEntryBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourTournamentDetail"

  /tour/tournaments/{id}/start:
    post:
      operationId: tourStartTournament
      tags: [tour]
      summary: Generate bracket and start tournament (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourTournamentDetail"

  /tour/matches/{matchId}/result:
    post:
      operationId: tourSubmitResult
      tags: [tour]
      summary: Submit match result (admin)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourResultBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourTournamentDetail"

  /tour/matches/{matchId}/autodarts:
    post:
      operationId: tourPullAutodarts
      tags: [tour]
      summary: Pull latest Autodarts result
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourAutodartsBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourAutodartsPullResult"

  /tour/oom:
    get:
      operationId: tourGetOom
      tags: [tour]
      summary: Get Order of Merit standings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourOomEntry"

  /tour/admin/verify:
    post:
      operationId: tourAdminVerify
      tags: [tour]
      summary: Verify admin PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourAdminVerifyBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourOkResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SetNameRequest:
      type: object
      properties:
        name:
          type: string
        schwierigkeitsgrad:
          type: integer
      required:
        - name
        - schwierigkeitsgrad

    BuyEquipmentRequest:
      type: object
      properties:
        id:
          type: string
      required:
        - id

    MatchResult:
      type: object
      properties:
        legs_won:
          type: integer
        legs_lost:
          type: integer
        my_avg:
          type: number
        my_180s:
          type: integer
        my_hf:
          type: integer
        my_co_pct:
          type: number
      required:
        - legs_won
        - legs_lost

    RoundInfo:
      type: object
      properties:
        name:
          type: string
        first_to:
          type: integer
        format:
          type: string
      required:
        - name
        - first_to
        - format

    Matchup:
      type: object
      properties:
        player1:
          type: string
        player2:
          type: string
      required:
        - player1
        - player2

    OomEntry:
      type: object
      properties:
        name:
          type: string
        geld:
          type: integer
      required:
        - name
        - geld

    Achievement:
      type: object
      properties:
        name:
          type: string
        desc:
          type: string
        unlocked:
          type: boolean
      required:
        - name
        - desc
        - unlocked

    Headline:
      type: object
      properties:
        titel:
          type: string
        text:
          type: string
      required:
        - titel
        - text

    Sponsor:
      type: object
      properties:
        name:
          type: string
        ziel_typ:
          type: string
        ziel_wert:
          type: integer
        aktuell:
          type: integer
        turniere_zeit:
          type: integer
        belohnung:
          type: integer
        text:
          type: string
      required:
        - name
        - ziel_typ
        - ziel_wert
        - aktuell
        - turniere_zeit
        - belohnung
        - text

    TournamentRecord:
      type: object
      properties:
        name:
          type: string
        typ:
          type: string
        runde:
          type: string
        ergebnis:
          type: string
        preisgeld:
          type: integer
        saison:
          type: integer
        avg:
          type: number
      required:
        - name
        - typ
        - runde
        - ergebnis
        - preisgeld
        - saison
        - avg

    RankingRecord:
      type: object
      properties:
        platz:
          type: integer
        saison:
          type: integer
        turnier:
          type: string
      required:
        - platz
        - saison
        - turnier

    EquipmentItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        beschreibung:
          type: string
        preis:
          type: integer
        kategorie:
          type: string
        bonus_typ:
          type: string
        bonus_wert:
          type: number
        owned:
          type: boolean
      required:
        - id
        - name
        - beschreibung
        - preis
        - kategorie
        - bonus_typ
        - bonus_wert
        - owned

    CalendarEntry:
      type: object
      properties:
        index:
          type: integer
        name:
          type: string
        typ:
          type: string
        format:
          type: string
        min_platz:
          type: integer
          nullable: true
        status:
          type: string
        qualifiziert:
          type: boolean
      required:
        - index
        - name
        - typ
        - format
        - status
        - qualifiziert

    H2HRecord:
      type: object
      properties:
        name:
          type: string
        siege:
          type: integer
        niederlagen:
          type: integer
      required:
        - name
        - siege
        - niederlagen

    GegnerForm:
      type: object
      properties:
        form:
          type: string
        bonus:
          type: number
      required:
        - form
        - bonus

    CareerState:
      type: object
      properties:
        spieler_name:
          type: string
        name_set:
          type: boolean
        hat_tourcard:
          type: boolean
        q_school_punkte:
          type: integer
        order_of_merit_geld:
          type: integer
        bank_konto:
          type: integer
        saison_jahr:
          type: integer
        turnier_laeuft:
          type: boolean
        aktuelle_runde:
          type: integer
        gegner_name:
          type: string
        gegner_avg:
          type: number
        gegner_form:
          $ref: "#/components/schemas/GegnerForm"
        stats_spiele:
          type: integer
        stats_siege:
          type: integer
        stats_legs_won:
          type: integer
        stats_legs_lost:
          type: integer
        stats_180s:
          type: integer
        stats_highest_finish:
          type: integer
        achievements:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Achievement"
        aktiver_sponsor:
          $ref: "#/components/schemas/Sponsor"
          nullable: true
        letzte_schlagzeile:
          $ref: "#/components/schemas/Headline"
          nullable: true
        platz:
          type: integer
        turnier_name:
          type: string
        quote:
          type: number
        gesamt_avg:
          type: number
        gesamt_co:
          type: number
        oom:
          type: array
          items:
            $ref: "#/components/schemas/OomEntry"
        runden_info:
          $ref: "#/components/schemas/RoundInfo"
        matchups:
          type: array
          items:
            $ref: "#/components/schemas/Matchup"
        h2h_siege:
          type: integer
        h2h_niederlagen:
          type: integer
        walk_on_video:
          type: string
          nullable: true
        ranking_verlauf:
          type: array
          items:
            $ref: "#/components/schemas/RankingRecord"
        avg_bonus:
          type: number
          nullable: true
    TourPlayer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        autodarts_username:
          type: string
        created_at:
          type: string
        oom_points:
          type: integer
        oom_rank:
          type: integer
      required:
        - id
        - name
        - autodarts_username
        - created_at
        - oom_points

    TourPlayerTournamentResult:
      type: object
      properties:
        tournament_id:
          type: integer
        tournament_name:
          type: string
        tournament_type:
          type: string
        best_round:
          type: string
        points:
          type: integer
      required:
        - tournament_id
        - tournament_name
        - tournament_type
        - best_round
        - points

    TourPlayerProfile:
      type: object
      properties:
        player:
          $ref: "#/components/schemas/TourPlayer"
        tournament_results:
          type: array
          items:
            $ref: "#/components/schemas/TourPlayerTournamentResult"
        wins:
          type: integer
        losses:
          type: integer
      required:
        - player
        - tournament_results
        - wins
        - losses

    TourRegisterBody:
      type: object
      properties:
        name:
          type: string
        autodarts_username:
          type: string
        autodarts_refresh_token:
          type: string
      required:
        - name
        - autodarts_username

    TourTournament:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        typ:
          type: string
          enum:
            - players_championship
            - european_tour
            - world_series
            - major
        datum:
          type: string
        status:
          type: string
          enum:
            - offen
            - laufend
            - abgeschlossen
        legs_format:
          type: integer
        max_players:
          type: integer
        player_count:
          type: integer
        winner_name:
          type: string
      required:
        - id
        - name
        - typ
        - datum
        - status
        - legs_format
        - max_players
        - player_count

    TourTournamentDetail:
      type: object
      properties:
        tournament:
          $ref: "#/components/schemas/TourTournament"
        players:
          type: array
          items:
            $ref: "#/components/schemas/TourPlayer"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/TourMatch"
        rounds:
          type: array
          items:
            type: string
      required:
        - tournament
        - players
        - matches
        - rounds

    TourMatch:
      type: object
      properties:
        id:
          type: integer
        tournament_id:
          type: integer
        runde:
          type: string
        match_nr:
          type: integer
        player1_id:
          type: integer
        player2_id:
          type: integer
        player1_name:
          type: string
        player2_name:
          type: string
        winner_id:
          type: integer
        score_p1:
          type: integer
        score_p2:
          type: integer
        status:
          type: string
          enum:
            - ausstehend
            - laufend
            - abgeschlossen
        is_bye:
          type: boolean
      required:
        - id
        - tournament_id
        - runde
        - match_nr
        - status
        - is_bye

    TourCreateTournamentBody:
      type: object
      properties:
        name:
          type: string
        typ:
          type: string
          enum:
            - players_championship
            - european_tour
            - world_series
            - major
        datum:
          type: string
        legs_format:
          type: integer
        max_players:
          type: integer
        admin_pin:
          type: string
      required:
        - name
        - typ
        - datum
        - legs_format
        - max_players
        - admin_pin

    TourResultBody:
      type: object
      properties:
        winner_id:
          type: integer
        score_p1:
          type: integer
        score_p2:
          type: integer
        admin_pin:
          type: string
      required:
        - winner_id
        - score_p1
        - score_p2
        - admin_pin

    TourOomEntry:
      type: object
      properties:
        rank:
          type: integer
        player_id:
          type: integer
        player_name:
          type: string
        autodarts_username:
          type: string
        total_points:
          type: integer
        tournaments_played:
          type: integer
        best_result:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/TourOomResult"
      required:
        - rank
        - player_id
        - player_name
        - autodarts_username
        - total_points
        - tournaments_played
        - results

    TourOomResult:
      type: object
      properties:
        tournament_name:
          type: string
        typ:
          type: string
        points:
          type: integer
        round:
          type: string
      required:
        - tournament_name
        - typ
        - points
        - round

    TourOkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    TourAddEntryBody:
      type: object
      properties:
        player_id:
          type: integer
        seed:
          type: integer
      required:
        - player_id

    TourRemoveEntryBody:
      type: object
      properties:
        player_id:
          type: integer
      required:
        - player_id

    TourAutodartsBody:
      type: object
      properties:
        admin_pin:
          type: string
      required:
        - admin_pin

    TourAdminVerifyBody:
      type: object
      properties:
        pin:
          type: string
      required:
        - pin

    TourAutodartsPullResult:
      type: object
      properties:
        found:
          type: boolean
        match_id:
          type: string
        player1_legs:
          type: integer
        player2_legs:
          type: integer
        player1_avg:
          type: number
        player2_avg:
          type: number
      required:
        - found
