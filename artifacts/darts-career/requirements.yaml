packages:
  "framer-motion": "For epic slide-in and smooth page transitions"
  "react-hook-form": "For robust match result form handling"
  "@hookform/resolvers": "Zod validation integration for forms"
  "lucide-react": "For beautiful sports and UI icons"
  "clsx": "For conditional class names"
  "tailwind-merge": "For merging tailwind classes safely"

images:
